name: Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
          
      - name: Run Pytest
        run: |
          if [ -d "backend/tests" ] && [ "$(ls -A backend/tests)" ]; then
            python -m pytest backend/tests/
          else
            echo "No tests found in backend/tests/, skipping pytest."
          fi

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Build frontend
        run: npm run build

  deploy:
    name: Deploy
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Proceed to Deploy
        run: echo "All tests passed successfully. Deploying to production..."
        # Actual deployment logic to Railway/Vercel handles via repo connection,
        # but this job ensures the pipeline only "passes" completely if tests pass first.
